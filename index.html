<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/skeletons/pics/icons/Skull-256px.png"/>
  <link rel="manifest" href="/skeletons/manifest.json">
  <link rel="apple-touch-icon" href="/skeletons/pics/icons/Skull-192px.png">

  <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Skeleton Defense"/>
  <meta name="theme-color" content="#000">
  <title>Skeletons - Tower Defense</title>

  <style>
  @font-face {
    font-family: 'Lilita One';
    src: url('/skeletons/fonts/LilitaOne-Regular.ttf') format('truetype');
    font-weight: 400;
    font-style: normal;
  }
  #installScreen{
    font-family: 'Lilita One';
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:#000;
    color:white;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    z-index:9999;
  }

  #installScreen img{
    width:60%;
    margin-bottom:20px;
  }
  </style>

  <script>

  function isMobile(){
    return /iphone|ipad|ipod|android/i.test(navigator.userAgent);
  }

  function isStandalone(){
    return window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
  }

  window.addEventListener("load",()=>{
    const mobile = isMobile();
    const standalone = isStandalone();
    if(mobile && !standalone){
      document.body.innerHTML = `
      <div id="installScreen">
      <img src="/skeletons/pics/install.png">
      <h2>Install Skeleton Defense</h2>
      <p>Share → Add to Home Screen</p>
      <img src="/skeletons/pics/icons/Skull-256px.png" style="width:80px;margin-top:50px">
      </div>`;
    }
  });
  </script>
  <script type="module" crossorigin src="/skeletons/assets/index-sbCLAZ5j.js"></script>
  <link rel="stylesheet" crossorigin href="/skeletons/assets/index-BEOqmWA1.css">
</head>

<body>
  <div id="app" style="position: fixed;"></div>
</body>
</html>
